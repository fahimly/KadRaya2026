<!DOCTYPE html><html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kad Raya Digital 2026 - Tradisional Melayu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }:root {
  --green-deep:#143b2c;
  --green-mid:#2e5b41;
  --gold:#d4a84f;
  --gold-soft:#f0d89a;
  --cream:#f6edd7;
  --panel: rgba(20,59,44,0.9);
}

body {
  font-family: Georgia, "Times New Roman", serif;
  min-height: 100vh;
  background: linear-gradient(135deg,var(--green-deep),var(--green-mid));
  color: var(--cream);
  overflow: hidden;
}

/* corak songket background */
body::before {
  content:"";
  position: fixed;
  inset:0;
  background-image:
    repeating-linear-gradient(45deg, rgba(212,168,79,0.08) 0 10px, transparent 10px 20px);
  opacity:0.4;
}

.container {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}

.card {
  width:100%; max-width:1100px;
  display:grid; grid-template-columns:1fr 1fr;
  background:rgba(0,0,0,0.2);
  border:2px solid var(--gold);
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.left, .right { padding:40px; }

h1 {
  font-size:3rem;
  color:var(--gold-soft);
  margin-bottom:15px;
  text-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.greeting-box {
  background:rgba(255,255,255,0.05);
  border-left:4px solid var(--gold);
  padding:20px;
  border-radius:12px;
  line-height:1.8;
}

.actions { margin-top:20px; display:flex; gap:10px; }

button {
  padding:12px 16px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.primary { background:var(--gold); color:#143b2c; }
.secondary { background:rgba(255,255,255,0.1); color:white; }

.right { position:relative; display:flex; align-items:center; justify-content:center; }

/* kad utama */
.visual-card {
  width:320px; height:500px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--gold);
  border-radius:20px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:15px;
  opacity:0; transform:scale(0.9);
  transition:1s;
  text-align:center;
}

.visual-card.show { opacity:1; transform:scale(1); }

.preview-title { font-size:2rem; color:var(--gold-soft); }
.preview-text { font-size:0.95rem; line-height:1.7; }

/* ketupat */
.ketupat {
  position:absolute;
  width:60px; height:60px;
  background:linear-gradient(135deg,#cfa94d,#f0d89a);
  transform:rotate(45deg);
  top:20px;
}

.ketupat.left { left:20px; }
.ketupat.right { right:20px; }

/* rumah kampung silhouette */
.kampung {
  position:absolute;
  bottom:0;
  width:100%; height:120px;
  background:linear-gradient(to top, #0b241a, transparent);
}

.kampung::before {
  content:"";
  position:absolute;
  left:50%; bottom:0;
  width:200px; height:80px;
  background:#0b241a;
  transform:translateX(-50%) skewX(-20deg);
}

/* sampul */
.envelope-wrap { position:absolute; }

.envelope {
  width:250px; height:160px;
  position:relative;
}

.env-back { position:absolute; inset:0; background:var(--gold); }

.env-flap {
  position:absolute;
  top:0;
  width:0; height:0;
  border-left:125px solid transparent;
  border-right:125px solid transparent;
  border-top:80px solid #f0d89a;
  transform-origin:top;
  transition:1s;
}

.envelope.open .env-flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  width:180px; height:100px;
  left:35px; bottom:20px;
  background:white;
  display:flex; align-items:center; justify-content:center;
  color:black;
  transition:1s;
}

.envelope.open .letter { transform:translateY(-80px); opacity:0; }

  </style>
</head>
<body><div class="container">
  <div class="card"><section class="left">
  <h1>Salam Aidilfitri<br>Maaf Zahir &amp; Batin</h1>

  <div class="greeting-box">
    Dengan penuh keikhlasan, saya Mohammad Fahim Aiman mengucapkan Selamat Hari Raya Aidilfitri.
    Semoga Syawal 2026 membawa kebahagiaan dan keberkatan buat semua.
  </div>

  <div class="actions">
    <button class="primary" onclick="revealCard()">Buka Kad Raya</button>
    <button class="secondary" onclick="playAgain()">Tutup Kad Raya</button>
  </div>
</section>

<section class="right">

  <div class="ketupat left"></div>
  <div class="ketupat right"></div>

  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="letter">Selamat Raya</div>
      <div class="env-flap"></div>
    </div>
  </div>

  <div class="visual-card" id="cardArea">
    <div class="preview-title">Salam Aidilfitri</div>
    <div class="preview-text">
      Selamat Hari Raya Aidilfitri, maaf zahir dan batin.
    </div>
  </div>

  <div class="kampung"></div>

</section>

  </div>
</div><script>
  const cardArea = document.getElementById('cardArea');
  const envelopeWrap = document.getElementById('envelopeWrap');
  const envelope = document.getElementById('envelope');

  function revealCard() {
    envelope.classList.add('open');

    const audio = document.getElementById('bgMusic');
    if(audio){ audio.play().catch(()=>{}); }

    setTimeout(()=>{
      envelopeWrap.style.display='none';
      cardArea.classList.add('show');
    },800);
  }

  function playAgain() {
    const audio = document.getElementById('bgMusic');
    if(audio){ audio.pause(); audio.currentTime=0; }

    cardArea.classList.remove('show');
    envelopeWrap.style.display='block';
    envelope.classList.remove('open');
  }
</script><audio id="bgMusic" src="lagu-raya.mp3"></audio>

</body>
</html>
